spring.datasource.hikari.maximum-pool-size=5
# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parcelhub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lily}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}