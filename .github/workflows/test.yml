name: test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        # 把 GitHub 仓库代码拉到 runner 上
        uses: actions/checkout@v5

      - name: Set up JDK 21
        # 安装并配置 JDK; 用 Temurin 的 JDK 21; 开启 Maven 依赖缓存
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Check Docker
        # 如果集成测试使用 Testcontainers，这一步可以确认 CI 里 Docker 可用
        run: docker version

      - name: Run all tests
        # 执行单元测试 + 集成测试；临时跳过 Checkstyle 阻塞
        run: mvn -B clean verify -Dcheckstyle.skip=true

      - name: Show test reports
        # 失败时直接把测试报告打印到 GitHub Actions 日志里
        if: failure()
        run: |
          echo "=== Surefire reports ==="
          find target/surefire-reports -type f -maxdepth 1 -print -exec cat {} \; || true

          echo "=== Failsafe reports ==="
          find target/failsafe-reports -type f -maxdepth 1 -print -exec cat {} \; || true

      - name: Upload test reports
        # 即使前面失败了，也上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: ignore