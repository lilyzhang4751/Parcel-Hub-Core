name: test

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
      - 'origin/**'
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        # 把 GitHub 仓库代码拉到 runner 上
        uses: actions/checkout@v5

      - name: Set up JDK 21
        # 安装并配置 JDK; 用 Temurin 的 JDK 21; 开启 Maven 依赖缓存
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        # 执行 Maven 命令; 使用-B batch mode；clean 先清理上次构建产物；test 编译并执行测试
        run: mvn -B clean test

      - name: Upload test reports
        # 即使前面失败了，也执行这一步。
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: ignore